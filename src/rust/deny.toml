[graph]
targets = []
all-features = true

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  # rustls/ring/untrusted transitive crates
  "ISC",
  # webpki-roots certificate bundle data
  "CDLA-Permissive-2.0",
  "Unicode-3.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
