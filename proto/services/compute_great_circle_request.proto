syntax = "proto3";

package qsoripper.services;

option csharp_namespace = "QsoRipper.Services";

import "domain/geo_reference.proto";

// Request to compute a great-circle geodesic between two points.
//
// `sample_count` controls the number of points returned along the
// geodesic (including both endpoints):
//   - 0           => server default (64)
//   - 1           => INVALID_ARGUMENT (need at least both endpoints)
//   - 2..=512     => honored as-is
//   - > 512       => INVALID_ARGUMENT (server caps to prevent abuse)
message ComputeGreatCircleRequest {
  qsoripper.domain.GeoReference origin = 1;
  qsoripper.domain.GeoReference target = 2;
  uint32 sample_count = 3;
}
