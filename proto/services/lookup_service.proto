syntax = "proto3";

package logripper.services;

option csharp_namespace = "LogRipper.Services";

import "domain/callsign.proto";
import "domain/lookup.proto";

// The app-facing lookup interface. Maps to the architecture's
// CallsignLookup -> LookupCoordinator -> CallsignProvider flow.
//
// The Rust engine implements this service (tonic).
// The .NET GUI consumes it (Grpc.Net.Client).
service LookupService {
  // Single lookup — returns the final resolved result.
  rpc Lookup(logripper.domain.LookupRequest) returns (logripper.domain.LookupResult);

  // Streaming lookup — emits progressive updates as lookup state evolves
  // (Loading -> Stale/Cached -> Found/NotFound/Error).
  // The TUI uses this for real-time feedback during typing.
  rpc StreamLookup(logripper.domain.LookupRequest) returns (stream logripper.domain.LookupResult);

  // Retrieve a callsign from L1 cache only. Returns NOT_FOUND state if not cached.
  rpc GetCachedCallsign(logripper.domain.CachedCallsignRequest) returns (logripper.domain.LookupResult);

  // DXCC entity lookup.
  rpc GetDxccEntity(logripper.domain.DxccRequest) returns (logripper.domain.DxccEntity);

  // Batch lookup for prefetch/contest scenarios.
  rpc BatchLookup(logripper.domain.BatchLookupRequest) returns (logripper.domain.BatchLookupResponse);
}
