syntax = "proto3";

package qsoripper.services;

option csharp_namespace = "QsoRipper.Services";

import "services/delete_qso_request.proto";
import "services/delete_qso_response.proto";
import "services/export_adif_request.proto";
import "services/export_adif_response.proto";
import "services/get_qso_request.proto";
import "services/get_qso_response.proto";
import "services/get_sync_status_request.proto";
import "services/get_sync_status_response.proto";
import "services/import_adif_request.proto";
import "services/import_adif_response.proto";
import "services/list_qsos_request.proto";
import "services/list_qsos_response.proto";
import "services/log_qso_request.proto";
import "services/log_qso_response.proto";
import "services/restore_qso_request.proto";
import "services/restore_qso_response.proto";
import "services/sync_with_qrz_request.proto";
import "services/sync_with_qrz_response.proto";
import "services/update_qso_request.proto";
import "services/update_qso_response.proto";

// Core logbook operations. Covers local QSO CRUD, QRZ logbook sync, and ADIF import/export.
//
// Implementation status:
//   LogQso        — implemented; optional per-operation QRZ sync implemented (sync_to_qrz=true)
//   UpdateQso     — implemented; optional per-operation QRZ sync implemented (sync_to_qrz=true)
//   DeleteQso     — implemented for local storage; QRZ delete supported when delete_from_qrz=true
//   GetQso        — implemented for local storage
//   ListQsos      — implemented for local storage
//   SyncWithQrz   — implemented (both engines)
//   GetSyncStatus — implemented for local storage counts
//   ImportAdif    — implemented for local ADIF migration import with duplicate/warning reporting
//   ExportAdif    — implemented for filtered ADIF export
//
// Transport: native gRPC (HTTP/2 + binary protobuf).
// Browser clients must go through a gRPC-Web proxy — see docs/api/client-integration.md.
//
// Client reference: docs/api/logbook-service.md
service LogbookService {
  // --- QSO CRUD ---

  // Log a new QSO. Returns the engine-assigned local_id and optional QRZ sync result.
  rpc LogQso(LogQsoRequest) returns (LogQsoResponse);

  // Update an existing QSO identified by QsoRecord.local_id.
  // Returns NOT_FOUND if local_id does not exist.
  rpc UpdateQso(UpdateQsoRequest) returns (UpdateQsoResponse);

  // Delete a QSO from the local logbook.
  //
  // Under the soft-delete model, this always sets deleted_at and hides the
  // row from ListQsos (default filter). Setting delete_from_qrz=true marks
  // the row pending_remote_delete so the next SyncWithQrz removes it from
  // QRZ; the response's remote_delete_queued=true indicates this. Users
  // can reverse the decision via RestoreQso before the next sync runs.
  // After a successful remote delete, the local row remains soft-deleted
  // (trashed) and can still be restored locally, but QRZ no longer has a
  // copy.
  rpc DeleteQso(DeleteQsoRequest) returns (DeleteQsoResponse);

  // Restore a soft-deleted QSO. Clears deleted_at and pending_remote_delete.
  // If the remote copy on QRZ was already deleted (qrz_logid cleared), the
  // restored row is marked sync_status=LOCAL_ONLY so the next sync re-uploads
  // it as a new record. Returns FAILED_PRECONDITION if the row is not
  // currently soft-deleted.
  rpc RestoreQso(RestoreQsoRequest) returns (RestoreQsoResponse);

  // Get a single QSO by local UUID.
  // Returns NOT_FOUND if local_id does not exist.
  rpc GetQso(GetQsoRequest) returns (GetQsoResponse);

  // List QSOs with optional filters. Results are server-streamed.
  //
  // All filter fields are optional; omitting all filters returns all QSOs (subject to limit/offset).
  // Clients should consume incrementally rather than buffering the full stream.
  rpc ListQsos(ListQsosRequest) returns (stream ListQsosResponse);

  // --- QRZ Sync ---

  // Trigger a full or incremental sync with the QRZ logbook.
  rpc SyncWithQrz(SyncWithQrzRequest) returns (stream SyncWithQrzResponse);

  // Get current sync/logbook statistics (counts, last sync time, logbook owner).
  rpc GetSyncStatus(GetSyncStatusRequest) returns (GetSyncStatusResponse);

  // --- ADIF Import/Export ---

  // Import QSOs from ADIF data. The client streams raw ADIF bytes in one or more chunks;
  // the server parses and imports after the client closes the send side.
  // Returns a summary with counts and any per-record warnings.
  // Duplicate policy: an incoming record is skipped when it matches an existing QSO on
  // station_callsign, worked_callsign, utc_timestamp, band, mode, and compatible submode/frequency.
  // When refresh=true on the request, duplicates are updated instead of skipped: non-empty import
  // fields overwrite the existing record while preserving fields absent from the import.
  rpc ImportAdif(stream ImportAdifRequest) returns (ImportAdifResponse);

  // Export QSOs to ADIF format. The server streams raw ADIF bytes back.
  // Clients should concatenate received chunks to reconstruct the full ADIF payload.
  // Export order is chronological (oldest first) after applying the request filters.
  rpc ExportAdif(ExportAdifRequest) returns (stream ExportAdifResponse);
}
