syntax = "proto3";

package qsoripper.domain;

option csharp_namespace = "QsoRipper.Domain";

// A geographic point on Earth in WGS84 decimal degrees.
// Latitude must be in [-90, 90]; longitude in [-180, 180].
// Engines must reject NaN/Inf or out-of-range values with INVALID_ARGUMENT.
message GeoPoint {
  double latitude = 1;
  double longitude = 2;
}
