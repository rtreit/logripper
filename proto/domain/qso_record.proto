syntax = "proto3";

package qsoripper.domain;

option csharp_namespace = "QsoRipper.Domain";

import "domain/band.proto";
import "domain/mode.proto";
import "domain/qsl_status.proto";
import "domain/qso_completion.proto";
import "domain/rst_report.proto";
import "domain/station_snapshot.proto";
import "domain/sync_status.proto";
import "google/protobuf/timestamp.proto";

// The core QSO (contact) record. This is QsoRipper's primary entity.
message QsoRecord {
  // --- Identity ---
  string local_id = 1;  // QsoRipper-assigned UUID
  optional string qrz_logid = 2;  // QRZ logbook record ID (after sync)
  optional string qrz_bookid = 3;  // QRZ logbook ID

  // --- Core contact fields ---
  string station_callsign = 10;  // Local operator's callsign
  string worked_callsign = 11;  // Remote station callsign
  google.protobuf.Timestamp utc_timestamp = 12;
  Band band = 13;
  Mode mode = 14;
  optional uint64 frequency_khz = 15 [deprecated = true];  // Deprecated: use frequency_hz for sub-kHz precision
  optional uint64 frequency_hz = 116;  // Precise frequency in Hz (e.g., 28075730 for 28.075730 MHz)
  optional string submode = 16;  // ADIF submode string (e.g., "USB", "PSK31")
  optional StationSnapshot station_snapshot = 17;  // Materialized local-station values used at log time
  optional google.protobuf.Timestamp utc_end_timestamp = 18;  // QSO end timestamp when known

  // --- Signal reports ---
  optional RstReport rst_sent = 20;
  optional RstReport rst_received = 21;
  optional string tx_power = 22;  // Transmit power

  // --- QSL / confirmation ---
  QslStatus qsl_sent_status = 30;
  QslStatus qsl_received_status = 31;
  optional bool lotw_sent = 32;
  optional bool lotw_received = 33;
  optional bool eqsl_sent = 34;
  optional bool eqsl_received = 35;
  optional google.protobuf.Timestamp qsl_sent_date = 36;  // Paper QSL sent date when known
  optional google.protobuf.Timestamp qsl_received_date = 37;  // Paper QSL received date when known

  // --- Enrichment from callsign lookup ---
  optional string worked_operator_callsign = 38;
  optional string worked_operator_name = 40;
  optional string worked_grid = 41;
  optional string worked_country = 42;
  optional uint32 worked_dxcc = 43;
  optional string worked_state = 44;
  optional uint32 worked_cq_zone = 45;
  optional uint32 worked_itu_zone = 46;
  optional string worked_county = 47;
  optional string worked_iota = 48;
  optional string worked_continent = 49;  // 2-letter
  optional string worked_arrl_section = 58;
  optional string skcc = 59;  // SKCC membership number of worked station

  // --- Contest fields ---
  optional string contest_id = 50;
  optional string serial_sent = 51;
  optional string serial_received = 52;
  optional string exchange_sent = 53;
  optional string exchange_received = 54;

  // --- Propagation ---
  optional string prop_mode = 55;  // ADIF Propagation Mode enum value
  optional string sat_name = 56;  // Satellite name
  optional string sat_mode = 57;  // Satellite mode

  // --- Operator notes ---
  optional string notes = 60;
  optional string comment = 61;

  // --- Metadata ---
  google.protobuf.Timestamp created_at = 70;
  google.protobuf.Timestamp updated_at = 71;
  SyncStatus sync_status = 72;

  // --- Soft delete ---
  // When set, this row is soft-deleted (in the trash). It is excluded from
  // ListQsos by default and from upload/import-duplicate matching. The row
  // persists until explicitly purged, allowing restore via RestoreQso.
  optional google.protobuf.Timestamp deleted_at = 73;
  // When true, this soft-deleted row also has a pending remote delete that
  // the next sync's Phase 2 should execute against QRZ (ACTION=DELETE,
  // LOGID:<qrz_logid>). Ignored when deleted_at is unset or qrz_logid is
  // empty. Cleared once the remote delete succeeds (or QRZ reports 404).
  bool pending_remote_delete = 74;

  // --- ADIF round-trip overflow ---
  // Stores ADIF fields not mapped to dedicated proto fields,
  // preserving them for lossless re-export. Key = ADIF field name (uppercase).
  map<string, string> extra_fields = 80;

  // --- Worked-station geographic location (ADIF LAT/LON/ALTITUDE/GRIDSQUARE_EXT) ---
  // Decimal degrees, signed (negative for S/W).
  optional double worked_latitude = 100;
  optional double worked_longitude = 101;
  // Worked station altitude in meters above mean sea level.
  optional double worked_altitude_meters = 102;
  // Maidenhead grid square extension (chars 7-8 of an 8-char grid) for higher
  // precision on top of `worked_grid`.
  optional string worked_gridsquare_ext = 103;

  // --- Split RX (ADIF FREQ_RX / BAND_RX) ---
  // Deprecated: use frequency_rx_hz for sub-kHz precision.
  optional uint64 frequency_rx_khz = 104 [deprecated = true];
  // Receiver frequency in Hz when running split.
  optional uint64 frequency_rx_hz = 117;
  // Receiver band when running split. Defaults to BAND_UNSPECIFIED if absent.
  Band band_rx = 105;

  // --- Ownership / completion ---
  // ADIF OWNER_CALLSIGN — owner of the station used to log the contact (may
  // differ from STATION_CALLSIGN and OPERATOR).
  optional string owner_callsign = 106;
  // ADIF QSO_COMPLETE — whether the contact was completed.
  QsoCompletion qso_complete = 107;
}
